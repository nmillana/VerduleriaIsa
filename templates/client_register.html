{% extends "base.html" %}
{% block content %}
<section class="form-panel narrow">
    <h1>Registro de clienta</h1>
    <p class="muted">Aquí quedarán guardados los datos de cada clienta para sus futuros pedidos.</p>
    {% if errors %}
        <div class="error-box">
            {% for error in errors %}<p>{{ error }}</p>{% endfor %}
        </div>
    {% endif %}
    <form method="post" class="stacked-form">
        <label>Nombre
            <input type="text" name="name" value="{{ values.name or '' }}" required>
        </label>
        <label>Correo
            <input type="email" name="email" value="{{ values.email or '' }}" required>
        </label>
        <label>Teléfono
            <input type="text" name="phone" value="{{ values.phone or '' }}" required>
        </label>
        <label>Dirección
            <textarea name="address" rows="3" required>{{ values.address or '' }}</textarea>
        </label>
        <button class="button primary" type="submit">Guardar registro</button>
    </form>
</section>
{% endblock %}
