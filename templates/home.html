{% extends "base.html" %}
{% block content %}
<section class="access-landing">
    <div class="access-card">
        <div class="access-card__logo-wrap">
            <img class="access-card__logo" src="/static/logo-verduleria-isa.png" alt="Verduleria Isa">
        </div>
        <p class="eyebrow">Acceso</p>
        <h1>Haz tu pedido semanal.</h1>
        <p class="lead">Ingresa con tu correo para continuar o crea tu registro si es tu primera vez.</p>
        <form method="post" action="/login-cliente" class="stacked-form access-form">
            <label>Clienta
                <input type="email" name="email" placeholder="Ingresa tu correo" required>
            </label>
            <button class="button primary full-width" type="submit">Continuar</button>
        </form>
        <a class="button ghost full-width" href="/registro">Crear mi usuario</a>
        <a class="button ghost full-width admin-access" href="/admin/login">Administrador</a>
    </div>
</section>
{% endblock %}
